services:
  - type: web
    name: watchroom
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma db push && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: watchroom-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: TWITCH_CLIENT_ID
        value: ""
      - key: TWITCH_CLIENT_SECRET
        value: ""

databases:
  - name: watchroom-db
    plan: free
    databaseName: watchroom
    user: watchroom
